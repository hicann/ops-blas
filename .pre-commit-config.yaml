repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.0
    hooks:
      - id: clang-format
        types_or: [c++, c]
  - repo: local
    hooks:
      - id: check-pragma-once
        name: Check #pragma once in headers
        entry: scripts/ci/check_pragma_once.sh
        language: script
        types_or: [c, c++]
        files: '\.(h|hpp)$'